<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joi's Apoyo Académico</title>
    <link rel="icon" type="image/jpg" href="Logo Joi's.jpg">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); max-width: 500px; width: 100%; border-top: 15px solid #2c3e50; overflow: hidden; }
        .content { padding: 30px; }
        h1 { text-align: center; color: #2c3e50; font-size: 26px; margin-top: 0; }
        .subtitle { text-align: center; color: #7f8c8d; font-style: italic; font-size: 13px; line-height: 1.5; margin-bottom: 30px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #34495e; }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #fff; }
        textarea { height: 100px; resize: none; }
        .file-box { border: 1px solid #ced4da; padding: 10px; border-radius: 8px; margin-top: 8px; background: #fafafa; }
        button { width: 100%; padding: 15px; background-color: #2c3e50; color: white; border: none; border-radius: 8px; margin-top: 25px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        button:disabled { background-color: #95a5a6; }
        #status { display: none; text-align: center; margin-top: 20px; color: #27ae60; font-weight: bold; padding: 10px; background: #e8f5e9; border-radius: 8px; }
    .contenedor-descarga {
    text-align: right;
    padding: 30px 0;
}

.boton-servicios-oro {
    background-color: #001f3f; /* Azul Marino Profundo */
    color: #f3cf7a; /* Dorado suave del logo */
    border: 2px solid #f3cf7a; /* Borde Dorado */
    padding: 15px 30px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.boton-servicios-oro:hover {
    background-color: #f3cf7a; /* Al pasar el mouse, se vuelve dorado */
    color: #001f3f; /* Y la letra azul */
    box-shadow: 0 6px 12px rgba(243, 207, 122, 0.4);
    transform: translateY(-2px);
}
    </style>
</head>
<body>

<div class="card">
    <div class="content">
        <h1>Joi's Apoyo Académico</h1>
        <p class="subtitle">
            "Esto es manejado por Asistentes de sistemas que te contactarán una vez envíes tu solicitud de servicio, por ahora, nos ubicamos solamente en QUIBDÓ-CHOCÓ, COLOMBIA para trabajos en físico."
        </p>
        <div class="contenedor-descarga">
    <a href="servicios-jois.jpg" download="Servicios Joi´s">
        <button class="boton-servicios-oro">
            <span class="icono">📋</span> DESCARGAR PORTAFOLIO DE SERVICIOS
        </button>
    </a>
</div>
        <form id="orderForm">
            <label>Nombre</label>
            <input type="text" id="name" required>

            <label>WhatsApp (Ej: 57300...)</label>
            <input type="tel" id="phone" required>

            <label>¿Qué necesitas que hagamos?</label>
            <textarea id="description" required></textarea>

            <label>Adjuntar Foto o Documento</label>
            <div class="file-box">
                <input type="file" id="file" accept="image/*, .pdf, .doc, .docx, .pptx" required>
            </div>

            <button type="submit" id="btn">ENVIAR SOLICITUD</button>
        </form>
        <div id="status">✅ Solicitud enviada con éxito.</div>
    </div>
</div>

<script>
    // PEGA AQUÍ LA NUEVA URL QUE COPIASTE EN EL PASO 2
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwNyE7HTMEfoEGfPlSTN4l7B9DXjX-KpKA4yupVUHCz25lbFm7Kj6-rnxX_Whnk-_Vccw/exec";

    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btn');
        const fileInput = document.getElementById('file');
        const file = fileInput.files[0];
        
        btn.disabled = true;
        btn.innerText = "PROCESANDO...";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        
        reader.onload = function() {
            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                description: document.getElementById('description').value,
                fileName: file.name,
                fileType: file.type,
                fileData: reader.result
            };

            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            }).then(() => {
                document.getElementById('orderForm').reset();
                document.getElementById('status').style.display = "block";
                btn.innerText = "ENVIADO";
            }).catch(err => {
                alert("Error de conexión. Inténtalo de nuevo.");
                btn.disabled = false;
                btn.innerText = "ENVIAR SOLICITUD";
            });
        };
    });
</script>

</body>

</html>
